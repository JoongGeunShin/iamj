name: iamj
description: "Plan your own day and specify those time."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  shared_preferences: ^2.5.3
  flutter_native_splash: ^2.4.7
  dio: ^5.9.2
  geolocator: ^14.0.2
  omni_datetime_picker: ^2.3.1
  intl: ^0.20.2
  time_picker_spinner_pop_up: ^3.0.0
  drift: any
  sqlite3_flutter_libs: any
  path_provider: any
  path: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^3.0.3
  build_runner: ^2.7.1
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.3
  flutter_launcher_icons: ^0.14.4
  drift_dev: any
flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo_resize.png"
  adaptive_icon_background: "#ffffff" # 배경색
  adaptive_icon_foreground: "assets/logo/app_logo_resize.png" # 로고만 있는 이미지

flutter_native_splash:
  color: "#ffffff"
  image: assets/logo/app_logo.png
  # 다크모드 대응(선택)
  color_dark: "#ffffff"
  image_dark: assets/logo/app_logo.png
  # Android 12+는 시스템 스플래시 규격이 따로 있어 별도 설정 권장
  android_12:
    color: "#ffffff"
    image: assets/logo/app_logo.png
    icon_background_color: "#ffffff"
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: WantedSans
      fonts:
        - asset: assets/fonts/WantedSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/WantedSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/WantedSans-Semibold.ttf
          weight: 600
        - asset: assets/fonts/WantedSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/WantedSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/WantedSans-Black.ttf
          weight: 900
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package